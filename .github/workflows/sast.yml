name: 🔬 SAST Scanning
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - master
  schedule:
    - cron: '0 8 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  semgrep:
    name: 🛡️ Semgrep Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: 🔍 Run Semgrep
        uses: returntocorp/semgrep-action@bd4f291307b02db709ad696a1b26857ea7e90e4f
        with:
          config: "auto p/security-audit p/owasp-top-ten"
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: 📤 Upload SARIF file
        if: always()
        uses: github/codeql-action/upload-sarif@5c777e48addcb0dd5a3d7aa3c6cbdbb3e5141ef1
        with:
          sarif_file: semgrep.sarif
